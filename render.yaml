services:
  # ---------------------------------------------------
  # BACKEND SERVICE (Spring Boot API)
  # ---------------------------------------------------
  - type: web
    name: banking-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    region: ohio
    plan: free
    envVars:
      - key: PORT
        value: 8180
      # Using your existing Railway MySQL Database
      - key: DB_URL
        value: jdbc:mysql://thomas.proxy.rlwy.net:17647/railway
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: lJyaEbkzuXiQNRmOZUggJzBPExMdosTE

  # ---------------------------------------------------
  # FRONTEND SERVICE (Angular)
  # ---------------------------------------------------
  - type: web
    name: banking-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist/banking-portal
    # Render's Rewrite rule for Single Page Applications (Angular)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
