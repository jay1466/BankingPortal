<div class="fintech-sidebar sticky top-20 left-0 transition-all duration-300 z-40 flex flex-col bg-white/90 flex-shrink-0" style="height: calc(100vh - 80px);" *ngIf="isLoggedIn()" [ngClass]="{ 'w-[220px]': sidebarVisible, 'w-[80px]': !sidebarVisible }">
  
  <!-- Toggle Button -->
  <div class="flex items-center px-4 py-3 justify-end border-b border-slate-200/50">
    <button
      type="button"
      title="Toggle Sidebar"
      (click)="toggleSidebar()"
      class="text-slate-400 hover:text-indigo-600 transition-colors focus:outline-none p-2 rounded-xl hover:bg-slate-100 w-10 h-10 flex justify-center items-center"
      [ngClass]="{ 'mx-auto': !sidebarVisible }"
    >
      <i class="fas fa-bars text-lg"></i>
    </button>
  </div>

  <!-- Navigation -->
  <div class="flex-grow overflow-y-auto overflow-x-hidden p-3 custom-scrollbar">
    <nav>
      <ul class="space-y-1.5">
        <li>
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            [routerLinkActiveOptions]="{exact: true}"
            routerLink="/dashboard"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Overview"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-home text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Overview</span>
          </a>
        </li>
        <li>
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            routerLink="/account/deposit"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Deposit"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-arrow-down text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Deposit</span>
          </a>
        </li>
        <li>
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            routerLink="/account/withdraw"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Withdraw"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-arrow-up text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Withdraw</span>
          </a>
        </li>
        <li>
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            routerLink="/account/fund-transfer"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Transfer"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-exchange-alt text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Transfer</span>
          </a>
        </li>
        <li>
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            routerLink="/account/pin"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Security PIN"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-lock text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Security PIN</span>
          </a>
        </li>
        <li class="pt-2 mt-2 border-t border-slate-200/50">
          <a
            routerLinkActive="bg-indigo-50 text-indigo-700 font-bold"
            routerLink="/account/transaction-history"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-800 font-medium transition-colors group"
            title="Transactions"
          >
            <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-indigo-600 transition-colors"
                 routerLinkActive="!text-indigo-600">
              <i class="fas fa-receipt text-lg"></i>
            </div>
            <span class="whitespace-nowrap transition-opacity duration-300 text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Transactions</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Logout Button (Fixed Bottom) -->
  <div class="p-3 border-t border-slate-200/50 mt-auto bg-slate-50/50">
    <button 
      (click)="logout()" 
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 hover:bg-rose-50 hover:text-rose-600 font-medium transition-colors group w-full"
      title="Logout"
    >
      <div class="w-8 h-8 rounded-lg flex justify-center items-center text-slate-400 group-hover:text-rose-600 transition-colors mx-auto"
           [ngClass]="{ 'mx-0': sidebarVisible, 'mx-auto': !sidebarVisible }">
        <i class="fas fa-sign-out-alt text-lg"></i>
      </div>
      <span class="whitespace-nowrap transition-opacity duration-300 text-left flex-grow text-sm" [ngClass]="{ 'opacity-100': sidebarVisible, 'opacity-0 hidden': !sidebarVisible }">Sign Out</span>
    </button>
  </div>
</div>

<style>
.custom-scrollbar::-webkit-scrollbar {
  width: 4px;
}
.custom-scrollbar::-webkit-scrollbar-track {
  background: transparent;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
  background: rgba(203, 213, 225, 0.5);
  border-radius: 4px;
}
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
  background: rgba(148, 163, 184, 0.8);
}
</style>
