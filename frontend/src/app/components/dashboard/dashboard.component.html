<div class="p-4 sm:p-6 lg:p-8 w-full max-w-[1600px] mx-auto">
  
  <div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Overview</h1>
      <p class="text-slate-500 mt-1 font-medium">Manage your accounts and track recent activity.</p>
    </div>
  </div>

  <!-- Row 1: Balance (Left, larger) & Profile (Right, smaller) -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
    <!-- Left Column (Balance & Actions) takes up 2/3 space -->
    <div class="lg:col-span-2">
      <app-accountdetailcard></app-accountdetailcard>
    </div>
    <!-- Right Column (Profile Summary) takes up 1/3 space -->
    <div class="lg:col-span-1">
      <app-userprofilecard></app-userprofilecard>
    </div>
  </div>

  <!-- Row 2: Analytics Charts -->
  <ng-container *ngIf="transactions.length > 0; else emptyCharts">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="lg:col-span-2 h-full">
        <app-monthly-transaction-chart [transactions]="transactions"></app-monthly-transaction-chart>
      </div>
      <div class="lg:col-span-1 h-full">
        <app-daily-transaction-piechart [transactions]="transactions"></app-daily-transaction-piechart>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyCharts>
    <div class="w-full bg-white/70 backdrop-blur-xl border border-slate-200 shadow-sm rounded-3xl p-10 flex flex-col items-center justify-center text-center mb-6">
      <div class="w-20 h-20 bg-indigo-50 rounded-full flex justify-center items-center text-indigo-500 mb-4 shadow-sm border border-indigo-100">
        <i class="fas fa-chart-line text-3xl"></i>
      </div>
      <h3 class="text-xl font-extrabold text-slate-900 mb-2">Your financial journey begins here!</h3>
      <p class="text-slate-500 max-w-md mb-6 font-medium">Deposit funds or transfer money to start seeing your analytics, spending habits, and account growth.</p>
      <a routerLink="/account/deposit" class="btn-primary !px-8 !py-3">
        Make a Deposit <i class="fas fa-arrow-right ml-2 text-xs"></i>
      </a>
    </div>
  </ng-template>

  <!-- Row 3: Transaction History Full Width -->
  <div class="w-full">
    <app-transaction-history [isStandalone]="false"></app-transaction-history>
  </div>

</div>
